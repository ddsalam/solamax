name: CI

# Gate tiap commit/PR. Termasuk uji akses-negatif multi-tenant (penegasan A):
# apps/dashboard/src/lib/scope.test.ts dijalankan oleh `pnpm -r test` → isolasi
# tenant/unit TAK BISA regresi senyap. Uji DB-live (scope.integration.test.ts)
# tetap gated SCOPE_LIVE_DB=1 (butuh Cloud SQL) — di-skip di CI.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Guard tabrakan migrasi Prisma: nomor duplikat / out-of-order gagal di
      # sini (di PR: berjalan pada merge-preview) — SEBELUM CD sempat
      # menjalankan `migrate deploy`. Riwayat: tabrakan 0012/0013.
      - run: bash scripts/ci/check-migrations.sh
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # packages/shared harus ter-build sebelum typecheck paket hilir.
      - run: pnpm --filter @solamax/shared build
      # Prisma client harus ter-generate; tipe tx transaksi (backend) berasal darinya.
      - run: pnpm --filter @solamax/backend prisma:generate
      # typecheck semua paket + SELURUH test suite (incl. uji akses-negatif).
      - run: pnpm check
